<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>G検定 きらきら学習カード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#fff3f8; --bg2:#f3ecff; --card:#ffffff; --accent:#ff9ec4; --accent2:#c4a6f0;
  --txt:#6b5560; --sub:#b89aac; --ok:#34c79a; --ng:#ff8585; --bubble:#fffafc;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Zen Maru Gothic",-apple-system,"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
  color:var(--txt);background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;
  -webkit-tap-highlight-color:transparent}
header{padding:14px 12px 6px;text-align:center;position:sticky;top:0;z-index:5;
  background:linear-gradient(180deg,rgba(255,243,248,.97),rgba(255,243,248,.85));backdrop-filter:blur(4px)}
header h1{margin:0;font-size:19px;color:#ff7eb3;text-shadow:0 1px 0 #fff}
.tabs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px 6px}
.tab{padding:6px 12px;border-radius:20px;background:#fff;color:var(--sub);font-size:12.5px;
  border:2px solid #ffe1ee;cursor:pointer;font-weight:700}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 3px 8px rgba(255,158,196,.4)}
.tab.quiz{background:#f3ecff;color:#9b7fd4;border-color:#e4d6ff}
.tab.quiz.active{background:var(--accent2);color:#fff;border-color:var(--accent2);box-shadow:0 3px 8px rgba(196,166,240,.45)}
.stage{max-width:1100px;margin:0 auto;padding:8px 20px 100px;display:flex;gap:28px;align-items:flex-start}
.content{flex:1;min-width:0;max-width:620px;margin:0 auto}
.buddy{width:320px;flex-shrink:0;position:sticky;top:124px;display:flex;flex-direction:column;align-items:center}
.buddy img{width:300px;max-width:100%;height:auto;max-height:64vh;object-fit:contain;
  border-radius:24px;border:4px solid #fff;box-shadow:0 12px 30px rgba(196,166,240,.42);background:#fff}
.bubble{position:relative;margin-top:16px;width:100%;background:var(--bubble);border:2px solid #ffe1ee;border-radius:18px;
  padding:13px 16px;font-size:15px;line-height:1.7;box-shadow:0 4px 10px rgba(255,158,196,.18);text-align:center}
.bubble:after{content:"";position:absolute;top:-9px;left:50%;margin-left:-7px;border:7px solid transparent;border-bottom-color:#ffe1ee}
.bubble:before{content:"";position:absolute;top:-6px;left:50%;margin-left:-6px;border:6px solid transparent;border-bottom-color:var(--bubble);z-index:1}
.bname{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:3px}
@media(max-width:880px){
  .stage{flex-direction:column;gap:8px;padding:6px 14px 96px}
  .buddy{position:static;width:100%;flex-direction:row;align-items:flex-end;gap:12px;margin-bottom:6px}
  .buddy img{width:130px;height:172px;max-height:none;object-fit:cover;object-position:top center}
  .bubble{margin-top:0;flex:1;text-align:left}
  .bubble:after{top:auto;bottom:18px;left:-9px;margin-left:0;border:7px solid transparent;border-right-color:#ffe1ee}
  .bubble:before{top:auto;bottom:19px;left:-6px;margin-left:0;border:6px solid transparent;border-right-color:var(--bubble)}
  .content{max-width:620px}
}
.prog{text-align:center;color:var(--sub);font-size:12.5px;margin:2px 0 6px}
.bar{height:8px;background:#ffe7f1;border-radius:99px;overflow:hidden;margin:0 0 14px}
.bar>div{height:100%;background:linear-gradient(90deg,#ffb3d4,#c4a6f0);width:0;transition:width .3s}
.card{background:var(--card);border-radius:22px;padding:22px 18px;min-height:34vh;display:flex;
  flex-direction:column;justify-content:center;box-shadow:0 8px 22px rgba(196,166,240,.22);border:2px solid #fff}
.qlabel{color:var(--accent);font-size:12px;font-weight:700;margin-bottom:10px}
.q{font-size:18px;line-height:1.75}
.a{margin-top:16px;padding-top:14px;border-top:2px dashed #ffd9e9;font-size:15.5px;line-height:1.85;display:none}
.a.show{display:block}
.a strong{color:#ef7aa8}
.tap{margin-top:16px;text-align:center;color:var(--sub);font-size:13px}
code{background:#fdeef5;color:#c66;padding:1px 6px;border-radius:6px;font-size:.9em}
ul{margin:8px 0;padding-left:20px}
.choices{margin-top:14px;display:flex;flex-direction:column;gap:9px}
.choice{text-align:left;padding:12px 14px;border-radius:14px;background:#fff7fb;color:var(--txt);
  border:2px solid #ffe1ee;font-size:14.5px;line-height:1.5;cursor:pointer;font-family:inherit;font-weight:500}
.choice .l{color:var(--accent2);font-weight:700;margin-right:8px}
.choice.correct{background:#e7fbf3;border-color:var(--ok)}
.choice.wrong{background:#ffeded;border-color:var(--ng)}
.exp{margin-top:14px;padding-top:13px;border-top:2px dashed #ffd9e9;font-size:14.5px;line-height:1.8;display:none}
.exp.show{display:block}
.exp strong{color:#ef7aa8}
.verdict{font-weight:700;font-size:16px;margin-bottom:6px}
.verdict.ok{color:var(--ok)} .verdict.ng{color:var(--ng)}
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;gap:9px;padding:12px 14px;max-width:620px;margin:0 auto;
  background:linear-gradient(transparent,var(--bg2) 35%)}
.nav button{flex:1;padding:14px;border:none;border-radius:16px;font-size:15px;font-weight:700;font-family:inherit;
  background:#fff;color:var(--accent2);border:2px solid #e9dcff;cursor:pointer}
.nav button.primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 10px rgba(255,158,196,.4)}
.nav button:active{transform:scale(.96)}
</style>
</head>
<body>
<header>
  <h1>🌸 G検定 きらきら学習カード 🌸</h1>
  <div class="tabs" id="tabs"></div>
</header>
<div class="stage">
  <aside class="buddy">
    <img id="bimg" alt="マスコット">
    <div class="bubble"><div class="bname" id="bname"></div><span id="btext"></span></div>
  </aside>
  <main class="content">
    <div class="prog" id="prog"></div>
    <div class="bar"><div id="barfill"></div></div>
    <div class="card" id="card"></div>
  </main>
</div>
<div class="nav" id="nav"></div>

iTWPI2xerex/gDXNHy5NV1jDfhns3RxRyOAcQ7lslu9fd79/Id+cp035dvU2LUCzEPL5rIMAXKQuSC1mAa6pyhZALUjFqUVlSKqoBUBRW1UVEsIqgUtQooqqKIgFERARVRBQqHLFENMua1CbURAtVREFRRFAVRFRERFAREQKREUBERAREQEREEREQClIiCUlIioyoKEIiAlIiCK8oKIgteZ+alAIioIiKKiqIqKiIiIiIgyUREFBREVEKIigIiICIioIiKAiIgIERBdkREH//Z", "name": "茜", "msgs": ["ようこそ！基礎からいっしょにいこ📚", "あせらなくて大丈夫、一歩ずつね✨", "その調子！よく頑張ってるよ", "わからなくて当たり前。今おぼえよ💪"], "cards": [{"q": "人工知能（AI）という言葉が初めて使われた1956年の会議の名前は？<br>", "a": "<strong>ダートマス会議</strong>。提唱者は <strong>ジョン・マッカーシー</strong>。この会議で &quot;Artificial Intelligence&quot; という言葉が初めて使われた。<br>"}, {"q": "人工知能が何か新しいことを実現すると「それは単なる自動処理で知能ではない」と評価が下がる現象を何という？<br>", "a": "<strong>AI効果</strong>。AIの成果が一般化すると「知能とは関係ない」とみなされてしまう心理現象。<br>"}, {"q": "「知能とは何か」の明確な定義は、専門家の間で確立しているか？<br>", "a": "<strong>確立していない</strong>。人工知能の定義は研究者によって異なり、統一された定義は存在しない。<br>"}, {"q": "あらかじめ決められた振る舞いしかできない（単純な制御プログラム）AIのレベルは？<br>", "a": "<strong>レベル1（単純な制御プログラム）</strong>。エアコンの温度調整など。マーケティング上「AI搭載」と呼ばれることがある。<br>"}, {"q": "入力と出力の組み合わせが多彩で、ルールベースで適切な判断を下すAIのレベルは？<br>", "a": "<strong>レベル2（古典的な人工知能）</strong>。掃除ロボットや診断プログラムなど、探索・推論やルールベースで対応するもの。<br>"}, {"q": "データから自動でルールや知識を学習するAIのレベルは？<br>", "a": "<strong>レベル3（機械学習を取り入れた人工知能）</strong>。検索エンジンやビッグデータ分析など。<br>"}, {"q": "学習に使う「特徴量」自体を自動で獲得するAIのレベルは？<br>", "a": "<strong>レベル4（ディープラーニングを取り入れた人工知能）</strong>。特徴量を人間が設計せず、自動で学習する。<br>"}, {"q": "人間と同じor それ以上に、あらゆる課題を汎用的にこなせるAIを何という？<br>", "a": "<strong>汎用人工知能（AGI: Artificial General Intelligence / 強いAI）</strong>。特定タスクに特化したものは <strong>特化型AI（弱いAI）</strong>。<br>"}, {"q": "「強いAI」「弱いAI」という区別を提唱した哲学者は？<br>", "a": "<strong>ジョン・サール</strong>。心を持つAIを「強いAI」、道具としてのAIを「弱いAI」と呼んだ。<br>"}, {"q": "ジョン・サールが「強いAI」を批判するために示した思考実験は？<br>", "a": "<strong>中国語の部屋</strong>。記号操作だけで受け答えしても、本当に「意味を理解している」とは限らない、という主張。<br>"}, {"q": "機械が知能を持つかどうかを、人間が会話相手として判別できるかで判定するテストは？<br>", "a": "<strong>チューリングテスト</strong>。アラン・チューリングが提案。判定者が機械と人間を区別できなければ「知能あり」とみなす。<br>"}, {"q": "チューリングテストに合格するAIを作るための競技会は？<br>", "a": "<strong>ローブナーコンテスト</strong>。チューリングテストに基づき、最も人間らしいプログラムを表彰する。<br>"}, {"q": "技術的特異点（AIが人間の知能を超え、爆発的に進化する転換点）を何という？また提唱者は？<br>", "a": "<strong>シンギュラリティ（技術的特異点）</strong>。<strong>レイ・カーツワイル</strong> が2045年に到来すると予測した（2045年問題）。<br>"}, {"q": "「2029年にAIが人間レベルの知能を持つ」と予測した人物は？<br>", "a": "<strong>レイ・カーツワイル</strong>。シンギュラリティの代表的論者。<br>"}, {"q": "AIの進化が人類に脅威となりうると警告した著名人を挙げよ。<br>", "a": "<strong>スティーブン・ホーキング</strong>、<strong>イーロン・マスク</strong>、<strong>ビル・ゲイツ</strong> など。<br>"}, {"q": "機械学習・ディープラーニング・人工知能の包含関係は？<br>", "a": "<strong>人工知能 ⊃ 機械学習 ⊃ ディープラーニング</strong>。ディープラーニングは機械学習の一手法。<br>"}, {"q": "人間が手作業でルールを書く代わりに、データから規則性を見つける手法の総称は？<br>", "a": "<strong>機械学習（Machine Learning）</strong>。明示的にプログラムせずにデータから学習する。<br>"}, {"q": "チェスや将棋など「特定の領域で人間を上回ったAI」は強いAIか弱いAIか？<br>", "a": "<strong>弱いAI（特化型AI）</strong>。特定タスクに特化しており、汎用的な知能は持たない。<br>"}, {"q": "ディープラーニングが従来の機械学習と決定的に違う点は？<br>", "a": "<strong>特徴量を自動で獲得できる点</strong>。従来は人間が特徴量を設計（特徴量エンジニアリング）する必要があった。<br>"}, {"q": "「フレーム問題」「シンボルグラウンディング問題」のように、AIが直面する根本的な難問は、主にどの分野で問われる？<br>", "a": "歴史・動向の分野（→ [02_AIの歴史.md](02_AIの歴史.md) で詳しく扱う）。AIとは何かを理解した上で、実現の壁として登場する。<br>"}]}, {"label": "AIの歴史", "img": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAIwAaQDASIAAhEBAxEB/8QAHQABAQABBQEBAAAAAAAAAAAAAAECAwQFBgcICf/EAE4QAAEDAgMEBgYGBwUGBQUAAAEAAgMEEQUSIQYxQVEHEyJhcYEUMpGhscEII0JSctEVYoKSorLhFiQzwvA0Q1Oz0vEmNURjZVRzdZPD/8QAGgEBAQADAQEAAAAAAAAAAAAAAAECAwQFBv/EAC4RAQEAAgEEAQMEAgEEAwAAAAABAhEDBBIhMVEFMkETImFxIzMUQoHB8JHR4f/aAAwDAQACEQMRAD8A+klFVF5r0FRRVAREQREsigqKIqKiIgIhUQVLqIiLdFERVRERAaoiKhxVUVQERRAREUBLqIgqKIiit1EQLq3URQVFFVQRRVAuiib0FRREBERAQoiAiiBQVFFQgIqiCIiKgiJdAREQW6iIgKoiAoqoiCIiAiIEURVEQREVBVAtnjGL0eBYbNiFdJ1cEIubC5cdwa0cXE6AIjXqqqnoKaSpq544IIxmfJI4Na0d5K8t2q+kHg+C1DqfDMNqMRLd8sj+pjPgLFx8wF5h0k9ImI7W1sjpZzT4fCT1dPG/ss7yRvdzd7LBdKp31FaWvky00GgbAGAucObid3Oyv8tkw+XqtZ9IvHcUBdheH0eHsaNc7DO4nxNh7lt6Hp52yhl/vQw2eMffpsvvaQvN6rDqaUNblL2De0 JZBEVsiAiIiv/Z", "name": "楓", "msgs": ["歴史は流れでつかむと楽しいよ！", "年号より「なぜ」が大事だね📖", "おぉ、いい感じ！次いこ次いこ", "ブームの順番、もう覚えた？✨"], "cards": [{"q": "AIブームは過去に何度あった？それぞれの中心技術は？<br>", "a": "<strong>3度</strong>。<br><ul><li>第1次（1950s〜60s）: <strong>探索・推論</strong></li><li>第2次（1980s）: <strong>知識（エキスパートシステム）</strong></li><li>第3次（2000s〜現在）: <strong>機械学習・ディープラーニング</strong></li></ul>ブームの後には「冬の時代」が来た。<br>"}, {"q": "第1次AIブームで盛んだった「探索」の手法を2つ挙げよ。<br>", "a": "<strong>幅優先探索</strong> と <strong>深さ優先探索</strong>。場合分けを木構造（探索木）で表して解を探す。<br>"}, {"q": "第1次ブームのAIが解けたのは簡単な問題に限られ、現実の複雑な問題は解けなかった。この限界を何という？<br>", "a": "<strong>トイ・プロブレム（おもちゃの問題）</strong>。迷路やパズルは解けても、現実問題には対応できなかった。<br>"}, {"q": "探索を効率化するため、ゴールに近そうな手がかり（評価値）を使う探索を何という？<br>", "a": "<strong>ヒューリスティック探索</strong>。代表例に <strong>A\\*（エースター）アルゴリズム</strong> や、ゲーム木の <strong>Mini-Max法</strong>、<strong>αβ法（アルファベータ法）</strong> がある。<br>"}, {"q": "相手は自分が不利になる手を選ぶと仮定して最善手を探す、ゲーム木の探索手法は？<br>", "a": "<strong>Mini-Max法（ミニマックス法）</strong>。これを枝刈りで効率化したのが <strong>αβ法</strong>。<br>"}, {"q": "第2次AIブームを支えた、専門家の知識をルール化して問題解決するシステムは？<br>", "a": "<strong>エキスパートシステム</strong>。代表例は感染症診断の <strong>MYCIN（マイシン）</strong>。<br>"}, {"q": "世界初のエキスパートシステムと、医療診断で有名なエキスパートシステムをそれぞれ答えよ。<br>", "a": "世界初は <strong>DENDRAL（デンドラル）</strong>（1965年、ファイゲンバウムら。未知の有機化合物を質量分析で特定）。医療では <strong>MYCIN（マイシン）</strong>（1970年代、感染症を診断し抗生物質を推奨。約65%の精度）。<br>"}, {"q": "あらゆる一般常識をコンピュータに入力しようとした、1984年開始の大規模プロジェクトは？<br>", "a": "<strong>Cyc（サイク）プロジェクト</strong>。ダグラス・レナートが主導。今も続く（知識記述の困難さの象徴）。<br>"}, {"q": "知識を記述する際、概念間の関係（is-a, part-ofなど）を体系化した仕組みを何という？<br>", "a": "<strong>オントロジー</strong>。意味ネットワークなどで知識を構造化する。「ヘビーウェイトオントロジー」「ライトウェイトオントロジー」の区別もある。<br>"}, {"q": "エキスパートシステムの大きな課題（限界）を2つ挙げよ。<br>", "a": "①<strong>知識獲得のボトルネック</strong>（専門家の知識をルール化するのが大変）、②<strong>例外や矛盾への対応が難しい</strong>。これが第2次冬の時代の一因。<br>"}, {"q": "AIに「考慮すべき事柄を適切に絞り込めない」という根本的難問を何という？<br>", "a": "<strong>フレーム問題</strong>。1969年にマッカーシーとヘイズが提起。今しようとしていることに関係ある事項だけを選び出すのが難しい。<br>"}, {"q": "記号（シンボル）と、それが指す実世界の意味を結びつけられない問題を何という？<br>", "a": "<strong>シンボルグラウンディング問題</strong>。スティーブン・ハルナッドが提起。「シマウマ」という記号と実物のシマウマを結びつけられない。<br>"}, {"q": "第3次AIブームのきっかけとなった、2012年の画像認識コンペとその勝者は？<br>", "a": "<strong>ILSVRC（ImageNet大規模画像認識競技会）</strong> で、ジェフリー・ヒントン率いるチームの <strong>AlexNet</strong> が圧勝。ディープラーニングが一躍注目された。<br>"}, {"q": "2016年に囲碁のトップ棋士を破ったDeepMindのAIは？<br>", "a": "<strong>AlphaGo（アルファ碁）</strong>。ディープラーニングと強化学習（モンテカルロ木探索）を組み合わせた。<br>"}, {"q": "1997年にチェス世界王者カスパロフを破ったIBMのコンピュータは？<br>", "a": "<strong>ディープ・ブルー（Deep Blue）</strong>。第2次ブーム的な探索の延長。<br>"}, {"q": "2011年に米国のクイズ番組で人間王者に勝ったIBMの質問応答システムは？<br>", "a": "<strong>ワトソン（Watson）</strong>。質問応答（QA）技術。後に医療など各分野に応用された。<br>"}, {"q": "ニューラルネットワークの起源、1958年にローゼンブラットが考案した学習機械は？<br>", "a": "<strong>パーセプトロン</strong>。<br>"}, {"q": "単純パーセプトロンの限界（線形分離不可能な問題は解けない）を指摘した人物は？<br>", "a": "<strong>マービン・ミンスキー</strong>（とパパート）。代表例は <strong>XOR（排他的論理和）問題</strong> が解けないこと。これが第1次冬の時代の一因。<br>"}, {"q": "多層パーセプトロンを学習させる、誤差を逆向きに伝える手法は？<br>", "a": "<strong>誤差逆伝播法（バックプロパゲーション）</strong>。1986年頃にラメルハートらが広めた。XOR問題も解けるようになった。<br>"}, {"q": "ニューラルネットの層を深くすると学習が進まなくなる、第2次的な壁を何という？<br>", "a": "<strong>勾配消失問題</strong>。逆伝播時に勾配が層を遡るほど小さくなる。後にReLUや事前学習などで克服された（→ [04](04_ディープラーニングの概要.md)）。<br>"}, {"q": "2006年にヒントンが提案した、層ごとに事前学習してから全体を調整する手法は？<br>", "a": "<strong>オートエンコーダによる事前学習（プレトレーニング）／ディープビリーフネットワーク</strong>。深い層の学習を可能にし、第3次ブームの足がかりとなった。<br>"}, {"q": "大量のデータが活用できるようになった時代背景を表すキーワードは？<br>", "a": "<strong>ビッグデータ</strong>。インターネット普及・計算機性能（GPU）向上とともに、第3次ブームを支えた。<br>"}, {"q": "ディープラーニングの計算に広く使われる、並列計算が得意な演算装置は？<br>", "a": "<strong>GPU（Graphics Processing Unit）</strong>。NVIDIAの <strong>CUDA</strong> などで深層学習に活用。さらに特化した <strong>TPU</strong>（Google）もある。<br>"}, {"q": "AIが学習データのバイアスを反映して差別的判断をした有名な失敗例（マイクロソフトのチャットボット）は？<br>", "a": "<strong>Tay（テイ）</strong>。Twitter上で不適切な発言を学習し、暴言を吐くようになり停止された。データの質の重要性を示す例。<br>"}, {"q": "第1次・第2次の「冬の時代」が来た共通の理由を一言で。<br>", "a": "<strong>期待された万能さを実現できず、限界（トイ・プロブレム／知識獲得のボトルネック）が露呈し、投資が引いたため</strong>。<br>"}]}, {"label": "機械学習", "img": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIW ー）</strong>。分岐基準に <strong>情報利得（エントロピー）</strong> や <strong>ジニ係数</strong> を使う。解釈しやすいのが利点。<br>"}, {"q": "多数の決定木を作り、その多数決/平均で予測する手法は？<br>", "a": "<strong>ランダムフォレスト</strong>。<strong>アンサンブル学習</strong> の一種（<strong>バギング</strong>）。各木を異なるデータ・特徴量で学習させる。<br>"}, {"q": "複数の弱い学習器を組み合わせて精度を上げる手法の総称は？<br>", "a": "<strong>アンサンブル学習</strong>。代表は <strong>バギング</strong>（並列・例: ランダムフォレスト）と <strong>ブースティング</strong>（逐次・例: AdaBoost, 勾配ブースティング/XGBoost）。<br>"}, {"q": "前の学習器の誤りを次の学習器が重点的に補正していくアンサンブル手法は？<br>", "a": "<strong>ブースティング</strong>。逐次的に学習。AdaBoost、勾配ブースティング、XGBoost、LightGBMなど。<br>"}, {"q": "未知のデータを、近くにある既知データの多数決で分類する手法は？<br>", "a": "<strong>k近傍法（k-NN）</strong>。最も近いk個の多数決で分類する。学習らしい学習をしない「怠惰学習」。<br>"}, {"q": "データをk個のグループに分ける代表的なクラスタリング手法は？<br>", "a": "<strong>k-means法（k平均法）</strong>。各点を最も近い重心に割り当て、重心を更新する操作を繰り返す。<br>"}, {"q": "クラスタを階層的（木構造）にまとめていくクラスタリング手法とその図は？<br>", "a": "<strong>階層的クラスタリング</strong>。結果を <strong>デンドログラム（樹形図）</strong> で可視化する。<br>"}, {"q": "多次元のデータを、情報をなるべく保ったまま少ない次元に圧縮する代表手法は？<br>", "a": "<strong>主成分分析（PCA）</strong>。分散が最大になる方向（主成分）に射影して次元削減する。<br>"}, {"q": "高次元データを2〜3次元で可視化するのに優れた次元削減手法は？<br>", "a": "<strong>t-SNE</strong>。近いデータ同士を近くに配置して可視化する。<br>"}, {"q": "学習データに過剰に適合し、未知データで性能が落ちる現象は？<br>", "a": "<strong>過学習（オーバーフィッティング）</strong>。逆に学習不足で精度が低いのは <strong>未学習（アンダーフィッティング）</strong>。<br>"}, {"q": "過学習を防ぐため、データを学習用と評価用に分けて検証する代表手法は？<br>", "a": "<strong>ホールドアウト法</strong>（単純分割）と <strong>交差検証（クロスバリデーション、特にk分割交差検証）</strong>。<br>"}, {"q": "モデルの誤差は何と何のトレードオフで説明される？<br>", "a": "<strong>バイアス（偏り）とバリアンス（分散）のトレードオフ</strong>。バイアス大=未学習、バリアンス大=過学習。<br>"}, {"q": "モデルが複雑になりすぎないようペナルティを加える手法は？<br>", "a": "<strong>正則化（regularization）</strong>。<strong>L1正則化（ラッソ）</strong> は不要な特徴量の重みを0に、<strong>L2正則化（リッジ）</strong> は重みを小さく抑える。<br>"}, {"q": "分類モデルの評価で、予測と正解の対応をまとめた表は？<br>", "a": "<strong>混同行列（confusion matrix）</strong>。TP・FP・FN・TN の4区分で整理する。<br>"}, {"q": "「全体のうち正しく予測できた割合」を表す指標は？<br>", "a": "<strong>正解率（Accuracy）</strong> = (TP+TN) / 全体。ただしデータが偏ると当てにならない。<br>"}, {"q": "「陽性と予測したうち本当に陽性だった割合」を表す指標は？<br>", "a": "<strong>適合率（Precision）</strong> = TP / (TP+FP)。誤検出を減らしたいときに重視。<br>"}, {"q": "「本当に陽性のうち、陽性と予測できた割合」を表す指標は？<br>", "a": "<strong>再現率（Recall）</strong> = TP / (TP+FN)。見逃しを減らしたいとき（病気の検出など）に重視。<br>"}, {"q": "適合率と再現率はトレードオフ。両者のバランスをとる指標は？<br>", "a": "<strong>F値（F1スコア）</strong>。適合率と再現率の <strong>調和平均</strong>。<br>"}, {"q": "強化学習で「どの状態でどう行動するか」の戦略を何という？<br>", "a": "<strong>方策（ポリシー）</strong>。報酬を最大化する方策を学習するのが強化学習の目的。<br>"}, {"q": "強化学習における「行動価値」を学習する代表的アルゴリズムは？<br>", "a": "<strong>Q学習（Q-learning）</strong>。状態×行動の価値（Q値）を更新していく。<br>"}, {"q": "「今の最善」を取り続けるか「未知を試す」かのジレンマを何という？<br>", "a": "<strong>探索と活用のトレードオフ（exploration vs exploitation）</strong>。強化学習の基本課題。<br>"}, {"q": "ラベル付きデータが少なく、ラベルなしデータも併用する学習を何という？<br>", "a": "<strong>半教師あり学習（semi-supervised learning）</strong>。少量のラベル付き＋大量のラベルなしで学習する。<br>"}]}, {"label": "DL概要", "img": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAJ2AaQDASIAAhEBAxEB/8QAHAABAQADAQEBAQAAAAAAAAAAAAECBAUDBgcI/8QAQhAAAgEDAgMEBwUFBwUBAQEAAAECAwQRBSESMUETUWFxBiKBkaGxwRQjMkJSM3LR4fAHFSRigqKyNEOSwvFTYyX/xAAZAQEBAQEBAQAAAAAAAAAAAAAAAQIDBAX/xAAnEQEBAAIDAAMAAQQCAwAAAAAAAQIRAyExBBJBUSIyQmETI3Ghwf/aAAwDAQACEQMRAD8A/o5AhT5b6QUgAoGSlQAKEAAUAMjJQAIwKgyACplyYlAMEAFKQoFTIDVvNStdPinc1owzyjhuT9i3BJ/DaBzYekGnykozqVqHFylcUJ04v/VJY+J0efiDVnoUEApAQCkAIAyAAIAQORckKFCFZAAHQgBhAEAABQEKAIUEBDJCgUEAEKAUAABSkyUqBSAqKQowBAUFDJCkAFRGAKAAGACAUpEjyu7qFpRdWalLpGMVmU5dEl3hFua8LWjKrNpJJ4T/ADPHI+UpekVnpjneVlCrdVJPM5zX3a5bRW+W/L3HO9JfS2Gn0Z1Lq8hQqTfAnBcX+iL5v2c+bZ8lC2q1o/3hbqncVJx46MbiMoQz0cuuDjlyd9PdxfG3P632tT00uLmM5yqVI05LHBCEUn4NtP5mpR1m7pxjGm5Rpr8Me2m8L/yPmaN3rlOahqNKhd01znZ5Uof6HzX7u/gzoQiqmJ0aqw91KPJ+zqZudv69GPBxzrT6O09JriNRRnWrQT6ylxL/AHZ+aO9DXZUnBV4wqxnynR2b/wBLe/sefA+Io8UHFzfA31XJ+R61Zb4pS9R7uH5cicljGfxsL50/RqNelc01UozjOD2yu/u8H4GZ8Ppuq1rOopxqYfJ8XKWOku9ePNdNtn9lZ3VO9oKrBOL5Si3vF9z/AK3 8Tp2GiWGmb2ttThJ85tZm/OT3H1yvqzLCePj9E9Gb2rKpdXMOCrcz7WrJ8k8JKKXckkj6ShoVCit3OT8sI7PCOE6aZvJa0Y6XbR34H72bMKUILEVg9uFDhQ0xcmHCmTs49x6YLgaTbBQwXhMkUptjwonCZAJtjguCjBDaYLgApsBQAAIEAgUKMAAAQAACkAEMiiYBQNCgArKAAiwAAAgAFAAQAADAAAAAogAIoAADAAEfMAAAABSAACgAMgACFAAEAAoYAAAAOowAAAAEKAAIAFCgAAAEXCAAH//Z", "name": "穂乃", "msgs": ["むずかしい所だけど一緒にね☺️", "仕組みの『なぜ』を大事に", "ここ踏ん張りどころ！えらい✨", "少しずつ進んでて立派だよ🍀"], "cards": [{"q": "ディープラーニングとは何を深くしたものか？<br>", "a": "<strong>ニューラルネットワークの隠れ層（中間層）を多層（深く）にしたもの</strong>。「深層学習」とも。<br>"}, {"q": "ニューラルネットワークの基本構成（3種の層）は？<br>", "a": "<strong>入力層・隠れ層（中間層）・出力層</strong>。各層はノード（ニューロン）からなる。<br>"}, {"q": "ニューロンが入力の重み付き和を受け取った後、出力に変換するために通す関数は？<br>", "a": "<strong>活性化関数（activation function）</strong>。非線形性を与え、複雑な表現を可能にする。<br>"}, {"q": "出力を0〜1に押し込める、古くから使われた活性化関数は？<br>", "a": "<strong>シグモイド関数</strong>。ただし層を深くすると <strong>勾配消失</strong> を起こしやすい。<br>"}, {"q": "「入力が0以下なら0、正ならそのまま出力」する、深層学習で主流の活性化関数は？<br>", "a": "<strong>ReLU（Rectified Linear Unit / ランプ関数）</strong>。勾配消失を起こしにくく、計算も軽い。<br>"}, {"q": "出力を-1〜1に収める活性化関数は？<br>", "a": "<strong>tanh（双曲線正接）関数</strong>。シグモイドより勾配が大きいが、やはり勾配消失は起こりうる。<br>"}, {"q": "多クラス分類の出力層で、各クラスの確率（合計1）を出す関数は？<br>", "a": "<strong>ソフトマックス関数（softmax）</strong>。出力を確率分布に変換する。<br>"}, {"q": "予測と正解のズレを表し、学習で最小化したい指標は？<br>", "a": "<strong>損失関数（誤差関数 / コスト関数）</strong>。回帰では <strong>平均二乗誤差（MSE）</strong>、分類では <strong>交差エントロピー誤差</strong> がよく使われる。<br>"}, {"q": "損失を小さくする方向にパラメータを少しずつ更新する基本手法は？<br>", "a": "<strong>勾配降下法（gradient descent）</strong>。損失関数の勾配（傾き）の逆方向にパラメータを動かす。<br>"}, {"q": "1回の更新でどれだけパラメータを動かすかを決める値は？<br>", "a": "<strong>学習率（learning rate）</strong>。大きすぎると発散、小さすぎると収束が遅い。<br>"}, {"q": "データ全体ではなく一部（ミニバッチ）ごとに勾配を計算して更新する手法は？<br>", "a": "<strong>確率的勾配降下法（SGD）/ ミニバッチ勾配降下法</strong>。計算効率がよく、局所解を抜け出しやすい。<br>"}, {"q": "SGDを改良した最適化手法（オプティマイザ）を挙げよ。<br>", "a": "<strong>モメンタム</strong>、<strong>AdaGrad</strong>、<strong>RMSProp</strong>、<strong>Adam</strong> など。Adamは特に広く使われる。<br>"}, {"q": "全学習データを1回学習し終える単位を何という？<br>", "a": "<strong>エポック（epoch）</strong>。何エポック学習させるかは重要なハイパーパラメータ。<br>"}, {"q": "勾配降下法が、真の最小値でない谷にはまる問題を何という？<br>", "a": "<strong>局所最適解（局所解）にはまる問題</strong>。真の最小は <strong>大域最適解（大域解）</strong>。鞍点（saddle point）も学習を停滞させる。<br>"}, {"q": "層が深いと勾配が小さくなって学習が進まない問題は？<br>", "a": "<strong>勾配消失問題</strong>。ReLUの採用や後述のバッチ正規化などで緩和される。<br>"}, {"q": "各層の入力分布を正規化して学習を安定・高速化する手法は？<br>", "a": "<strong>バッチ正規化（Batch Normalization）</strong>。勾配消失の緩和や過学習抑制にも効果がある。<br>"}, {"q": "学習時にランダムで一部のニューロンを無効化し、過学習を防ぐ手法は？<br>", "a": "<strong>ドロップアウト（dropout）</strong>。アンサンブル的な効果で汎化性能を高める。<br>"}, {"q": "検証データの誤差が悪化し始めたら学習を止め、過学習を防ぐ手法は？<br>", "a": "<strong>早期終了（early stopping）</strong>。<br>"}, {"q": "学習データを回転・反転・拡大などで水増しし、過学習を防ぐ手法は？<br>", "a": "<strong>データ拡張（data augmentation）</strong>。特に画像で有効。<br>"}, {"q": "モデルが自動で学習する値ではなく、人間が事前に決める設定値を何という？<br>", "a": "<strong>ハイパーパラメータ</strong>。学習率・層の数・バッチサイズなど。<strong>重み（パラメータ）</strong> は学習で自動調整される。<br>"}, {"q": "誤差を出力層から入力層へ遡らせて重みを更新する、学習の中核アルゴリズムは？<br>", "a": "<strong>誤差逆伝播法（バックプロパゲーション）</strong>。連鎖律（chain rule）で各重みの勾配を計算する。<br>"}, {"q": "ニューラルネットの「重み」の初期値が悪いと起こる問題と、その対策（初期化法）は？<br>", "a": "不適切だと勾配消失/爆発が起こる。対策に <strong>Xavier初期化（シグモイド/tanh向け）</strong>・<strong>He初期化（ReLU向け）</strong> がある。<br>"}, {"q": "学習済みモデルを別タスクに流用し、少ないデータで学習する手法は？<br>", "a": "<strong>転移学習（transfer learning）</strong>。一部の層だけ再学習する場合は <strong>ファインチューニング</strong>。<br>"}, {"q": "ディープラーニングが普及した「3つの追い風」を挙げよ。<br>", "a": "①<strong>ビッグデータ</strong>（大量の学習データ）、②<strong>GPU等の計算能力向上</strong>、③<strong>アルゴリズムの進歩</strong>（ReLU・事前学習など）。<br>"}, {"q": "ディープラーニングが特徴量を自動獲得することを表す呼び方は？<br>", "a": "<strong>表現学習（representation learning）</strong>。データから有効な特徴表現を自動で学ぶ。<br>"}]}, {"label": "DL手法", "img": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAIwAaQDASIAAhEBAxEB/8QAHAABAQEAAgMBAAAAAAAAAAAAAQACAwcEBQYI/8QATBAAAgEDAQQHBQMJBQYEBwAAAAECAwQRBQYSITEHE0FRYXGBFCKRocEjMrEVM0JSYnKCotEIkrLC4RYkJUPw Long Short-Term Memory）</strong>。ゲート機構で長期記憶を保持する。<br>"}, {"q": "LSTMを簡略化し、計算を軽くした手法は？<br>", "a": "<strong>GRU（Gated Recurrent Unit）</strong>。ゲートを減らしてLSTMより軽量。<br>"}, {"q": "入力系列を別の系列に変換する（翻訳など）枠組みは？<br>", "a": "<strong>Seq2Seq（系列変換 / Encoder-Decoderモデル）</strong>。エンコーダで入力を圧縮、デコーダで出力を生成する。<br>"}, {"q": "入力のどの部分に注目すべきかを学習する仕組みは？<br>", "a": "<strong>アテンション（注意機構 / Attention）</strong>。Seq2Seqの性能を大きく向上させた。<br>"}, {"q": "RNNを使わず、アテンションだけで構成された2017年発表のモデルは？<br>", "a": "<strong>Transformer</strong>。論文「Attention Is All You Need」。<strong>自己注意機構（Self-Attention）</strong> が中核。現在のLLMの基盤。<br>"}, {"q": "Transformerをベースに、文脈を双方向で学習するGoogleの言語モデルは？<br>", "a": "<strong>BERT</strong>。穴埋め（マスク言語モデル）で事前学習する。<br>"}, {"q": "Transformerをベースにした、OpenAIの文章生成モデル系列は？<br>", "a": "<strong>GPT（Generative Pre-trained Transformer）</strong>。次の単語を予測する形で学習する。ChatGPTの基盤。<br>"}, {"q": "大量テキストで事前学習された巨大な言語モデルの総称は？<br>", "a": "<strong>大規模言語モデル（LLM: Large Language Model）</strong>。GPT、Claude、Gemini など。<br>"}, {"q": "モデル規模・データ量・計算量を増やすほど性能が上がる経験則は？<br>", "a": "<strong>スケーリング則（Scaling Laws）</strong>。<br>"}, {"q": "LLMで、例をいくつか示すだけで新タスクをこなす能力を何という？<br>", "a": "<strong>フューショット学習（few-shot）</strong>。例なしは <strong>ゼロショット</strong>。プロンプト内で指示する手法は <strong>インコンテキスト学習</strong>。<br>"}, {"q": "人間のフィードバックでLLMの出力を望ましく調整する学習は？<br>", "a": "<strong>RLHF（人間のフィードバックによる強化学習 / Reinforcement Learning from Human Feedback）</strong>。<br>"}, {"q": "2つのネットワークを競わせて本物そっくりのデータを生成する生成モデルは？<br>", "a": "<strong>GAN（敵対的生成ネットワーク / Generative Adversarial Network）</strong>。<strong>生成器（Generator）</strong> と <strong>識別器（Discriminator）</strong> が競い合う。イアン・グッドフェロー提案。<br>"}, {"q": "入力を圧縮（エンコード）し復元（デコード）するネットワークで、次元削減や異常検知に使うものは？<br>", "a": "<strong>オートエンコーダ（自己符号化器）</strong>。確率的に生成できるよう拡張したものが <strong>VAE（変分オートエンコーダ）</strong>。<br>"}, {"q": "ノイズから少しずつデータを生成する、近年の高品質画像生成モデルは？<br>", "a": "<strong>拡散モデル（Diffusion Model）</strong>。Stable Diffusion や DALL·E などの基盤。<br>"}, {"q": "ディープラーニングと強化学習を組み合わせた学習は？<br>", "a": "<strong>深層強化学習（Deep Reinforcement Learning）</strong>。代表に <strong>DQN（Deep Q-Network）</strong>（DeepMindがAtariゲームを攻略）。<br>"}, {"q": "囲碁でプロを破ったAlphaGoが使った主な技術は？<br>", "a": "<strong>ディープラーニング＋強化学習＋モンテカルロ木探索</strong>。後継 <strong>AlphaGo Zero</strong> は人間の棋譜なし（自己対戦のみ）で強くなった。<br>"}, {"q": "画像とテキストなど複数種類のデータをまとめて扱うモデルを何という？<br>", "a": "<strong>マルチモーダルモデル（multimodal）</strong>。例: CLIP、GPT-4V など。<br>"}, {"q": "Transformerを画像認識に応用したモデルは？<br>", "a": "<strong>ViT（Vision Transformer）</strong>。画像をパッチに分割しTransformerで処理する。<br>"}, {"q": "学習済みの大規模モデルを、特定用途に合わせて追加学習することを何という？<br>", "a": "<strong>ファインチューニング</strong>。少ないパラメータだけ調整する効率的手法に <strong>LoRA</strong> などがある。<br>"}, {"q": "LLMが事実と異なる内容をもっともらしく生成してしまう現象は？<br>", "a": "<strong>ハルシネーション（hallucination / 幻覚）</strong>。LLMの代表的な課題。<br>"}, {"q": "外部の検索・知識を組み合わせてLLMの回答精度を高める手法は？<br>", "a": "<strong>RAG（検索拡張生成 / Retrieval-Augmented Generation）</strong>。外部データを検索して回答に反映し、ハルシネーションを抑える。<br>"}]}, {"label": "社会・倫理", "img": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAIwAaQDASIAAhEBAxEB/8QAHAABAQABBQEAAAAAAAAAAAAAAAECAwQFBwgG/8QASRAAAgEDAQQGBwQHBgUEAwEAAAECAwQRBQYSITEHIkFRYXEIExQygZGhI2KxwRUzQlJyktEkU4Ky4fAWNKKjwiVDg7M3REXx/8QAGQEBAQEBAQEAAAAAAAAAAAAAAAECBAMF/8QAJREBAQACAgIDAQACAwEAAAAAAAECEQMxBCESMkEiEyNCUWGB/9oADAMBAAIRAxEAPwD0WMAHx31EKARUKQoAFSARiC4GAqIoKgiNBGTJgAQywGiogACoC4GAIUmClAoCWfiEAcJq23GzGh+tV/runUalL3qSrRlUXhuRy8+GD5Z9Puwsa/qne3/8fsU93/fwPSceV6jPzk/XYgZwOh7d7MbSSUNL1qzuKr5UnLcqfyywznsGLLO1llAARoRTHBSIg7QMBRFIUIFRCoAwXmQqI0MFLgiscDBlgF0bY44guBgCMjKAqDBQBg0DJkIAIAKAAAAIoEChAApRMAuQEQABRGREihAjKTBQAwUBgjRkTAEwDLAxwBttr+/tdKsq19fV6dvbUIOpVqzeIwiubZ5t6TunC92ilU03R6taw02eYx9XlVrhd8muKX3Vw789n0vpAbXVLxS2etJv2a0kp3e6/fnjKT8IrHxfgdDwjLMm28z5+Xcd/j8M18q5uXO9RjTjXo1VUjSVTPNOSj//AKZxkpTaSlCXNxl2GpNpRy8vBq0bapXhKUYuMYLe38cl3+J1PLTTo1Ksa8XTbjUi8pxfLxO69gume40OrbabtDWncWVWKiq0nvTt3y583HwfwfYdO0bqlG2TpUtyt1lN55P , "冷静に積み上げれば大丈夫"], "cards": [{"q": "AIの判断根拠を人間が理解できるようにする技術・考え方は？<br>", "a": "<strong>XAI（説明可能なAI / eXplainable AI）</strong>。ディープラーニングの「ブラックボックス問題」への対応。<br>"}, {"q": "XAIの代表的手法を挙げよ。<br>", "a": "<strong>LIME</strong>、<strong>SHAP</strong>、<strong>Grad-CAM</strong>（画像で注目領域を可視化）など。<br>"}, {"q": "AIが学習データの偏りを反映し、不公平な判断をすることを何という？<br>", "a": "<strong>バイアス（公平性の問題）</strong>。採用・与信・司法などで差別を生む恐れがある。<br>"}, {"q": "AIの倫理・法・社会的課題を総称する言葉は？<br>", "a": "<strong>ELSI（Ethical, Legal and Social Issues / 倫理的・法的・社会的課題）</strong>。<br>"}, {"q": "個人情報の取り扱いを定める日本の法律は？<br>", "a": "<strong>個人情報保護法</strong>。本人の同意なき目的外利用や第三者提供を制限する。<br>"}, {"q": "特定の個人を識別できないよう加工し、復元・照合を防いだデータを何という？<br>", "a": "<strong>匿名加工情報</strong>。一定ルール下で本人同意なく利活用できる。中間的な <strong>仮名加工情報</strong> もある。<br>"}, {"q": "EUの厳格な個人データ保護規則は？<br>", "a": "<strong>GDPR（EU一般データ保護規則）</strong>。「忘れられる権利」やプロファイリングへの規制を含む。<br>"}, {"q": "GDPRに含まれる、自動処理のみによる重要な決定を拒否できる権利は？<br>", "a": "<strong>プロファイリングの規制／自動意思決定に服さない権利</strong>。「忘れられる権利（消去権）」も重要。<br>"}, {"q": "AI開発でデータ分析のための著作物利用を一定認める、日本の法律改正は？<br>", "a": "<strong>著作権法第30条の4</strong>（2018年改正）。情報解析目的なら原則として著作物を許諾なく利用できる（一定の条件あり）。<br>"}, {"q": "2024年に世界初の包括的AI規制として成立したEUの法律は？<br>", "a": "<strong>EU AI Act（EU AI規則）</strong>。AIをリスクに応じて分類し、許容できないリスクは禁止、ハイリスクには義務を課す <strong>リスクベースアプローチ</strong>。<br>"}, {"q": "日本でAI開発・利活用の指針を示した政府のガイドラインは？<br>", "a": "<strong>AI事業者ガイドライン</strong>（総務省・経産省、2024年）。従来の「AI開発ガイドライン」「利活用ガイドライン」等を統合。<br>"}, {"q": "内閣府が示したAI社会の基本理念「人間中心のAI社会原則」の中心的価値は？<br>", "a": "<strong>人間中心</strong>・<strong>教育/リテラシー</strong>・<strong>プライバシー確保</strong>・<strong>セキュリティ</strong>・<strong>公正競争</strong>・<strong>公平性・説明責任・透明性</strong>・<strong>イノベーション</strong> の7原則。<br>"}, {"q": "開発したAIや成果物の権利・責任の所在を契約前に整理する、経産省のモデルは？<br>", "a": "<strong>AI・データの利用に関する契約ガイドライン</strong>。データ・学習済みモデルの権利帰属を整理する。<br>"}, {"q": "学習済みモデルが、学習データを暗記して個人情報を漏らしてしまう攻撃は？<br>", "a": "<strong>メンバーシップ推論攻撃 / モデルからの情報抽出</strong>。プライバシー侵害のリスク。<br>"}, {"q": "入力にわずかなノイズを加えてAIに誤認識させる攻撃は？<br>", "a": "<strong>敵対的サンプル（Adversarial Examples）攻撃</strong>。標識を誤認識させるなど、安全性の脅威。<br>"}, {"q": "学習データに不正データを混入させ、モデルを汚染する攻撃は？<br>", "a": "<strong>データポイズニング（poisoning）攻撃</strong>。<br>"}, {"q": "AIが生成した偽の動画・音声・画像を何という？<br>", "a": "<strong>ディープフェイク（deepfake）</strong>。GAN等で作られ、なりすましやフェイクニュースに悪用される懸念。<br>"}, {"q": "AIによる雇用・労働への影響を論じた、オックスフォード大の有名な研究は？<br>", "a": "<strong>フレイ＆オズボーンの論文</strong>（2013年）。「米国の約47%の仕事が自動化リスク」と試算した。<br>"}, {"q": "自動運転で「事故時に誰を守るか」のような倫理判断を問う有名な思考実験は？<br>", "a": "<strong>トロッコ問題（trolley problem）</strong>。自動運転の倫理設計で議論される。<br>"}, {"q": "自動運転の自動化レベルは何段階に分かれる？<br>", "a": "<strong>レベル0〜5の6段階</strong>（SAE基準）。レベル3=条件付き自動運転、レベル4=高度自動運転、レベル5=完全自動運転。<br>"}, {"q": "AIシステムを実運用に乗せ、保守・改善し続ける開発運用の考え方は？<br>", "a": "<strong>MLOps（Machine Learning Operations）</strong>。モデルの継続的な学習・監視・再学習を支える。<br>"}, {"q": "運用中にデータの傾向が変化し、モデル精度が劣化する現象は？<br>", "a": "<strong>概念ドリフト（concept drift）／データドリフト</strong>。継続的な監視・再学習が必要。<br>"}, {"q": "AI開発を企画→PoC→実装→運用と段階的に進める考え方で、本格開発前に実現性を検証する工程は？<br>", "a": "<strong>PoC（Proof of Concept / 概念実証）</strong>。小規模に試して実現可能性・効果を確認する。<br>"}, {"q": "著作権・特許など、AIが生成したものに権利が発生するかの現行の基本的考え方は？<br>", "a": "日本では、著作物は「人間の創作的寄与」が必要で、<strong>AIが自律生成しただけのものは原則として著作物に当たらない</strong> とされる（人間の創作的関与の度合いが論点）。<br>"}, {"q": "AIの公平性・透明性・安全性を確保し、信頼できるAIを目指す国際的な考え方を何という？<br>", "a": "<strong>Trustworthy AI（信頼できるAI）／責任あるAI（Responsible AI）</strong>。OECDのAI原則やG7広島AIプロセスなどで国際的に推進されている。<br>"}]}, {"label": "用語補強", "img": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAIwAaQDASIAAhEBAxEB/8QAHAABAQADAQEBAQAAAAAAAAAAAAECBAUGAwcI/8QAQhAAAgEDAgMGBAMFBQgDAQEAAAECAwQRBSESMUEGEyJRYXGBkaGxFDLBI0JSYtEVM3Lh8AckQ4KSssLxNFOiFtL/xAAZAQEBAQEBAQAAAAAAAAAAAAABAAIDBAX/xAAkEQEBAAIDAAIBBQEBAAAAAAAAAQIRAyExEkFRBBMiMmEUcf/aAAwDAQACEQMRAD8A/pUAHge0ABIGQMEUBcEJBSMElBAICohSQAAQCZKKMkKCQAUkFIXAgQHQEgAEkAGCQyFwTBEAAIGQQEoIUkFIBQMgAgELkkAAkEBSIgASCFBIwACAACQACQACRkZIwRAASAASA いう？また改良版は？<br>", "a": "<strong>Dying ReLU 問題</strong>。改良版に <strong>Leaky ReLU</strong>・<strong>Parametric ReLU（PReLU）</strong>・<strong>ELU</strong> などがある。<br>"}, {"q": "モンテカルロ木探索（MCTS）はどんな場面で使われる手法か？<br>", "a": "ゲームなどの <strong>意思決定（探索）</strong>。ランダムシミュレーションを多数行い有望な手を選ぶ。AlphaGoで深層学習と組み合わされた。<br>"}, {"q": "強化学習で、行動価値（Q値）の更新に使う基本的な考え方の枠組みは？<br>", "a": "<strong>マルコフ決定過程（MDP）</strong>。状態・行動・報酬・遷移確率で定式化する。<br>"}, {"q": "強化学習で「方策そのもの」を直接学習する手法群を何という？<br>", "a": "<strong>方策勾配法（Policy Gradient）</strong>。価値ベース（Q学習等）と対比される。両者を組み合わせたのが <strong>Actor-Critic</strong>。<br>"}, {"q": "自然言語処理で、文章を単語などの単位に分割する処理は？<br>", "a": "<strong>形態素解析 / トークン化（tokenization）</strong>。日本語の代表ツールに MeCab、Janome など。<br>"}, {"q": "単語を意味を反映したベクトルで表現する技術と代表手法は？<br>", "a": "<strong>単語埋め込み（word embedding）</strong>。代表手法は <strong>Word2Vec</strong>、<strong>GloVe</strong>、<strong>fastText</strong>。<br>"}, {"q": "Word2Vecの2つの学習方式は？<br>", "a": "<strong>CBOW</strong>（周辺語から中心語を予測）と <strong>skip-gram</strong>（中心語から周辺語を予測）。<br>"}, {"q": "文書中の単語の重要度を「出現頻度×希少性」で測る古典的指標は？<br>", "a": "<strong>TF-IDF</strong>。単純な出現回数の表現は <strong>BoW（Bag of Words）</strong>。<br>"}, {"q": "音声認識・音声合成で使われてきた、時系列の確率モデルは？<br>", "a": "<strong>隠れマルコフモデル（HMM）</strong>。近年は深層学習（RNN/Transformer）に置き換わりつつある。<br>"}, {"q": "学習データが少ない問題の対策として、別タスクの知識を使う以外に、人工的にデータを増やす手法は？<br>", "a": "<strong>データ拡張（data augmentation）</strong>。画像なら回転・反転・切り抜き、テキストなら言い換えなど。<br>"}, {"q": "大きなモデルの知識を、小さなモデルに教え込んで軽量化する手法は？<br>", "a": "<strong>蒸留（knowledge distillation）</strong>。他の軽量化に <strong>量子化（quantization）</strong>・<strong>枝刈り（pruning）</strong> がある。<br>"}, {"q": "1つのモデルに複数タスクを同時に学習させ、汎化性能を高める手法は？<br>", "a": "<strong>マルチタスク学習（multi-task learning）</strong>。<br>"}, {"q": "「少数のラベルしかない／全くない」状況で、未知クラスを認識する学習をそれぞれ何という？<br>", "a": "少数例＝<strong>Few-shot学習</strong>、1例＝<strong>One-shot学習</strong>、例なし＝<strong>Zero-shot学習</strong>。<br>"}, {"q": "モデルの予測の「確信度」を適切に校正することを何という？<br>", "a": "<strong>キャリブレーション（calibration）</strong>。確率出力が実際の正解率と一致するよう調整する。<br>"}, {"q": "異常検知（正常データから外れたものを見つける）に使える  "a": "<strong>RLHF（人間のフィードバックによる強化学習）</strong>。近年は強化学習を使わない <strong>DPO（Direct Preference Optimization）</strong> も普及。<br>"}, {"q": "モデルを丸ごと再学習せず、少数の追加パラメータだけ調整する効率的な手法群は？<br>", "a": "<strong>PEFT（Parameter-Efficient Fine-Tuning）</strong>。代表が <strong>LoRA（Low-Rank Adaptation）</strong>。<br>"}, {"q": "ノイズを徐々に除去して画像を生成する、Stable DiffusionやDALL·Eの基盤技術は？<br>", "a": "<strong>拡散モデル（Diffusion Model）</strong>。ランダムノイズから少しずつ画像を作る。<br>"}, {"q": "画像とテキストを同じ空間で結びつけ、ゼロショット画像分類を可能にしたモデルは？<br>", "a": "<strong>CLIP</strong>（OpenAI）。テキストと画像の対応を学習。生成AIの土台技術の一つ。<br>"}, {"q": "テキスト・画像・音声など複数種類の入力を扱えるモデルを何という？<br>", "a": "<strong>マルチモーダルモデル</strong>。例: GPT-4o、Gemini、Claude など。<br>"}, {"q": "自律的に計画を立て、ツールを使って多段階のタスクを実行するLLM応用を何という？<br>", "a": "<strong>AIエージェント（LLMエージェント）</strong>。外部ツール呼び出し（function calling）やメモリと組み合わせる。<br>"}, {"q": "生成AIが学習データを再現し、著作物や個人情報を出力してしまうリスクを何という？<br>", "a": "<strong>著作権侵害・情報漏えいリスク（記憶・再生問題）</strong>。学習データの権利処理が問題になる。<br>"}, {"q": "2024年に成立した、世界初の包括的なAI規制法は？<br>", "a": "<strong>EU AI Act（EU AI規則）</strong>。リスクを4段階に分け、許容できないリスクは禁止、ハイリスクには厳しい義務を課す。<br>"}, {"q": "EU AI Actの「リスクベースアプローチ」の4区分を高い順に挙げよ。<br>", "a": "<strong>許容できないリスク（禁止）＞ ハイリスク（規制）＞ 限定リスク（透明性義務）＞ 最小リスク（規制なし）</strong>。<br>"}, {"q": "日本で2024年に公表された、開発者・提供者・利用者向けの統合的なAI指針は？<br>", "a": "<strong>AI事業者ガイドライン</strong>（総務省・経産省）。従来の複数ガイドラインを統合したもの。<br>"}, {"q": "G7が2023年に立ち上げた、生成AIの国際ルール作りの枠組みは？<br>", "a": "<strong>広島AIプロセス</strong>。開発者向けの国際指針・行動規範をまとめた。<br>"}, {"q": "生成AIの学習に著作物を使う際、日本の著作権法で根拠とされる条文は？<br>", "a": "<strong>著作権法第30条の4</strong>（情報解析目的の利用）。ただし「著作権者の利益を不当に害する場合」は除外される点に注意。<br>"}, {"q": "生成AIが作った画像・文章に著作権は発生するか（日本の基本的な考え方）？<br>", "a": "<strong>人間の創作的寄与があれば著作物になりうるが、AIが自律生成しただけのものは原則として著作物に当たらない</strong>とされる。<br>"}, {"q": "AIが作った偽動画・偽音声によるなりすましや偽情報の問題を何という？<br>", "a": "<strong>ディープフェイク</strong>。対策として、AI生成物に来歴を埋め込む <strong>電子透かし／来歴管理（C2PA等）</strong> が進む。<br>"}, {"q": "生成AIを業務利用する際の代表的な情報リスクを2つ挙げよ。<br>", "a": "①入力した<strong>機密情報・個人情報の漏えい</strong>（外部サービスに送信）、②<strong>出力の誤り（ハルシネーション）や著作権侵害</strong>。社内ガイドライン整備が重要 const FLASH=C.flash, QUIZ=C.quiz;
let mode='flash', sec=0, idx=0, shown=false;
let qi=0, answered=false, okCnt=0, ansCnt=0;
const tabs=document.getElementById('tabs'),card=document.getElementById('card'),nav=document.getElementById('nav');
const prog=document.getElementById('prog'),bar=document.getElementById('barfill');
const bimg=document.getElementById('bimg'),bname=document.getElementById('bname'),btext=document.getElementById('btext');
const pick=a=>a[Math.floor(Math.random()*a.length)];

FLASH.forEach((d,i)=>{const b=document.createElement('div');b.className='tab';b.textContent=d.label+'('+d.cards.length+')';
  b.onclick=()=>{mode='flash';sec=i;idx=0;shown=false;say(pick(d.msgs));render();};tabs.appendChild(b);});
const qb=document.createElement('div');qb.className='tab quiz';qb.textContent='🎯 模擬問題('+QUIZ.length+')';
qb.onclick=()=>{mode='quiz';say('準備はいい？いっしょに頑張ろ🌟');render();};tabs.appendChild(qb);

function say(t){btext.textContent=t;}
function setBuddy(){
  if(mode==='flash'){bimg.src=FLASH[sec].img;bname.textContent=FLASH[sec].name+'ちゃん';}
  else{bimg.src=C.quizImg;bname.textContent=C.quizName+'ちゃん';}
}
function setTabs(){[...tabs.children].forEach((t,i)=>{
  if(i<FLASH.length)t.classList.toggle('active',mode==='flash'&&i===sec);
  else t.classList.toggle('active',mode==='quiz');});}

function render(){setTabs();setBuddy();window.scrollTo(0,0);mode==='flash'?renderFlash():renderQuiz();}

function renderFlash(){
  const cards=FLASH[sec].cards,c=cards[idx];
  prog.textContent=FLASH[sec].label+'　'+(idx+1)+' / '+cards.length+' 枚';
  bar.style.width=((idx+1)/cards.length*100)+'%';
  card.innerHTML='<div class="qlabel">Q'+(idx+1)+'</div><div class="q">'+c.q+'</div>'+
    '<div class="a'+(shown?' show':'')+'">'+c.a+'</div>'+(shown?'':'<div class="tap">タップで答えを見る👀</div>');
  card.onclick=()=>{shown=!shown;if(shown)say(pick(C.reveal));render();};
  nav.innerHTML='<button onclick="prevF()">← 前</button><button class="primary" onclick="toggleF()">答え✨</button><button onclick="nextF()">次 →</button>';
}
function toggleF(){shown=!shown;if(shown)say(pick(C.reveal));render();}
function nextF(){const n=FLASH[sec].cards.length;idx=(idx+1)%n;shown=false;if(idx===0)say('一周おつかれさま！えらい💮');render();}
function prevF(){const n=FLASH[sec].cards.length;idx=(idx-1+n)%n;shown=false;render();}

function renderQuiz(){
  const q=QUIZ[qi];
  prog.textContent='模擬問題　第 '+(qi+1)+' 問 / '+QUIZ.length+'　｜　正解 '+okCnt+'/'+ansCnt;
  bar.style.width=((qi+1)/QUIZ.length*100)+'%';
  let h='<div class="qlabel">問'+(qi+1)+'</div><div class="q">'+q.q+'</div><div class="choices">';
  q.choices.forEach(ch=>{h+='<button class="choice" data-l="'+ch.l+'" onclick="answer(\''+ch.l+'\')"><span class="l">'+ch.l+'</span>'+ch.t+'</button>';});
  h+='</div><div class="exp" id="exp"></div>';
  card.innerHTML=h;card.onclick=null;
  nav.innerHTML='<button onclick="prevQ()">← 前</button><button class="primary" onclick="nextQ()">次の問題 →</button>';
}
function answer(l){
  if(answered)return;answered=true;ansCnt++;
  const q=QUIZ[qi],ok=(l===q.correct);if(ok)okCnt++;
  card.querySelectorAll('.choice').forEach(b=>{const bl=b.dataset.l;b.disabled=true;
    if(bl===q.correct)b.classList.add('correct');else if(bl===l)b.classList.add('wrong');});
  const exp=document.getElementById('exp');
  exp.innerHTML='<div class="verdict '+(ok?'ok':'ng')+'">'+(ok?'⭕ 正解！':'❌ 不正解')+'（正解: '+q.correct+'）</div>'+q.exp;
  exp.classList.add('show');
  say(ok?pick(C.quizOk):pick(C.quizNg));
  prog.textContent='模擬問題　第 '+(qi+1)+' 問 / '+QUIZ.length+'　｜　正解 '+okCnt+'/'+ansCnt;
}
function nextQ(){qi=(qi+1)%QUIZ.length;answered=false;if(qi===0)say('全問おつかれさま！正解 '+okCnt+'/'+QUIZ.length+'だよ🌟');render();}
function prevQ(){qi=(qi-1+QUIZ.length)%QUIZ.length;answered=false;render();}

document.addEventListener('keydown',e=>{if(mode==='flash'){if(e.key==='ArrowRight')nextF();if(e.key==='ArrowLeft')prevF();if(e.key===' '){e.preventDefault();toggleF();}}else{if(e.key==='ArrowRight')nextQ();if(e.key==='ArrowLeft')prevQ();}});
let sx=0;document.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)<60)return;if(mode==='flash'){dx<0?nextF():prevF();}else{dx<0?nextQ():prevQ();}},{passive:true});

say(pick(FLASH[0].msgs));render();
</script>
</body>
</html>
